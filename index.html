<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" placeholder="karan" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="deleteLast()">⌫</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function appendValue(value) {
    const operators = ['+', '-', '*', '/', '%'];
    const current = display.value;

    // Maximum length
    if (current.length >= 20) return;

    // First character operator na ho
    if (current === '' && operators.includes(value)) return;

    // Consecutive operators na ho
    const lastChar = current.slice(-1);

    if (
        operators.includes(lastChar) &&
        operators.includes(value)
    ) {
        return;
    }

    display.value += value;

    // Auto scroll to right
    display.scrollLeft = display.scrollWidth;
}

function clearDisplay() {
    display.value = '';
}

function deleteLast() {
    display.value = display.value.slice(0, -1);
}

function calculate() {
    try {
        const expression = display.value;

        // Empty display
        if (expression === '') return;

        // Last me operator na ho
        if (
            ['+', '-', '*', '/', '%']
            .includes(expression.slice(-1))
        ) {
            return;
        }

        let result = eval(expression);

        // Large result formatting
        if (result.toString().length > 12) {
            result = Number(result).toExponential(4);
        }

        display.value = result;

        display.scrollLeft = display.scrollWidth;
    } catch {
        display.value = 'Error';
    }
}

</script>

</body>
</html>
