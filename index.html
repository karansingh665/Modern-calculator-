<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" placeholder="karan" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="deleteLast()">⌫</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>


const display = document.getElementById("display");

const operators = ['+', '-', '*', '/', '%'];
const maxLength = 20;

function appendValue(value) {
    const current = display.value;
    const lastChar = current.slice(-1);

    // Maximum length limit
    if (current.length >= maxLength) return;

    // First character operator na ho
    if (current === '' && operators.includes(value)) {
        return;
    }

    // Consecutive operators block
    if (
        operators.includes(lastChar) &&
        operators.includes(value)
    ) {
        return;
    }

    // Decimal validation
    if (value === '.') {
        const parts = current.split(/[+\-*/%]/);
        const currentNumber = parts[parts.length - 1];

        // Ek number me sirf ek decimal
        if (currentNumber.includes('.')) {
            return;
        }

        // Operator ke baad "." dabaye to "0." add ho
        if (
            current === '' ||
            operators.includes(lastChar)
        ) {
            display.value += '0.';
            display.scrollLeft = display.scrollWidth;
            return;
        }
    }

    display.value += value;

    // Auto scroll right
    display.scrollLeft = display.scrollWidth;
}

function clearDisplay() {
    display.value = '';
}

function deleteLast() {
    display.value = display.value.slice(0, -1);
}

function calculate() {
    try {
        const expression = display.value;

        // Empty expression
        if (expression === '') return;

        // Last character operator na ho
        if (
            operators.includes(
                expression.charAt(expression.length - 1)
            )
        ) {
            return;
        }

        let result = eval(expression);

        // Infinity handle
        if (!isFinite(result)) {
            display.value = 'Error';
            return;
        }

        // Floating point cleanup
        if (typeof result === 'number') {
            result = Number(result.toFixed(10));
        }

        display.value = result.toString();

        display.scrollLeft = display.scrollWidth;
    } catch {
        display.value = 'Error';
    }
}
</script>

</body>
</html>
